<!doctype html>
<html lang="en">
  <body style="margin: 0; padding: 0; background-color: #f4f2ee">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f2ee">
      <tr>
        <td align="center" style="padding: 48px 24px">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 420px; background-color: #ffffff; border: 1px solid #e6e2da">
            <tr>
              <td align="center" style="padding: 44px 40px 32px">
                <div style="font-family: Georgia, 'Times New Roman', serif; font-size: 40px; letter-spacing: 1px; color: #1a1a1a">CaLí</div>
                <div style="font-family: Arial, Helvetica, sans-serif; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #8a8378; margin-top: 6px">Dinner Club</div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 0 40px">
                <h1 style="font-family: Georgia, 'Times New Roman', serif; font-weight: 300; font-size: 26px; color: #1a1a1a; margin: 0 0 12px">Your login link</h1>
                <p style="font-family: Arial, Helvetica, sans-serif; font-size: 13px; line-height: 1.6; color: #55504a; margin: 0 0 28px">Click the button below to sign in to Dinner Club. This link expires shortly and can only be used once.</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 0 40px 40px">
                <a href="{{ .ConfirmationURL }}" style="font-family: Arial, Helvetica, sans-serif; display: inline-block; background-color: #1a1a1a; color: #ffffff; text-decoration: none; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; padding: 14px 34px">Sign in</a>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 40px 44px">
                <p style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; line-height: 1.6; color: #a09a90; margin: 0; text-align: center">If you didn't request this email, you can safely ignore it.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
