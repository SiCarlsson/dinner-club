name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

env:
  NODE_VERSION: "26"
  PNPM_VERSION: "11.13.1"
  SUPABASE_CLI_VERSION: "2.109.1"

jobs:
  quality:
    name: Quality (lint · typecheck · unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

  integration:
    name: Integration (RLS)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start Supabase (applies migrations + seed)
        working-directory: ${{ github.workspace }}
        run: supabase start

      - name: Integration tests
        run: pnpm test:integration

      - name: Stop Supabase
        if: always()
        working-directory: ${{ github.workspace }}
        run: supabase stop

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start Supabase (applies migrations + seed)
        working-directory: ${{ github.workspace }}
        run: supabase start

      - name: Export Supabase env for the app
        working-directory: ${{ github.workspace }}
        run: |
          set -a
          source <(supabase status -o env)
          set +a
          {
            echo "NEXT_PUBLIC_SUPABASE_PROJECT_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY"
            echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_BASE_URL=http://localhost:3000"
          } >> "$GITHUB_ENV"

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop Supabase
        if: always()
        working-directory: ${{ github.workspace }}
        run: supabase stop
